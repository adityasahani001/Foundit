<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item | FindIt</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>FindIt</h1>
        <p>Found something? Let’s return it to the owner.</p>
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/report-found">Report Found</a></li>
            <li><a href="/search">Search</a></li>
        </ul>
    </nav>

    <!-- Form -->
    <section>
        <h2>Report Found Item</h2>

        <form id="foundForm" enctype="multipart/form-data">

            <label>Item Name:</label>
            <input type="text" id="itemname" required>

            <label>Category:</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Mobile">Mobile</option>
                <option value="Jewellery">Jewellery</option>
                <option value="Cloths">Cloths</option>
                <option value="Accessories">Accessories</option>
                <option value="Wallet">Wallet</option>
                <option value="Documents">Documents</option>
                <option value="Vehicle">Vehicle</option>
                <option value="Others">Others</option>
            </select>

            <label>Description:</label>
            <textarea id="description" rows="4" required></textarea>

            <label>Date Found:</label>
            <input type="date" id="date" required>

            <label>Found Location:</label>
            <input type="text" id="location" required>

            <label>Upload Image:</label>
            <input type="file" id="image" accept="image/*">

            <!-- 🔥 Image Preview -->
            <img id="preview" style="display:none; width:100%; margin-top:10px; border-radius:8px;">

            <button type="submit">Submit Report</button>

        </form>

        <!-- message -->
        <p id="msg"></p>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 FindIt | Developed by Aditya Sahani</p>
    </footer>

    <!-- 🔥 External JS -->
    <script src="{{ url_for('static', filename='js/upload.js') }}"></script>

</body>
</html>
