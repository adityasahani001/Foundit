<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item | FindIt</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <style>
        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 75vh;
        }

        .form-card {
            background: white;
            padding: 28px;
            border-radius: 12px;
            width: min(520px, 95%);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .form-card h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 18px;
        }

        .form-card input,
        .form-card select,
        .form-card textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 14px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        .form-card button {
            width: 100%;
        }

        #preview {
            display: none;
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
        }

        #msg {
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <h1>FindIt</h1>
    <p>Found something? Let’s return it to the owner.</p>
</header>

<!-- Navigation -->
<nav>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/report-found">Report Found</a></li>
        <li><a href="/report-lost">Report Lost</a></li>
        <li><a href="/search">Search</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
    </ul>
</nav>

<!-- Form -->
<div class="form-container">
    <div class="form-card">

        <h2>Report Found Item</h2>

        <form id="foundForm" enctype="multipart/form-data">

            <label>Item Name:</label>
            <input type="text" id="itemname" required>

            <label>Category:</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Mobile">Mobile</option>
                <option value="Jewellery">Jewellery</option>
                <option value="Clothes">Clothes</option>
                <option value="Accessories">Accessories</option>
                <option value="Wallet">Wallet</option>
                <option value="Documents">Documents</option>
                <option value="Vehicle">Vehicle</option>
                <option value="Others">Others</option>
            </select>

            <label>Description:</label>
            <textarea id="description" rows="4" required></textarea>

            <label>Date Found:</label>
            <input type="date" id="date" required>

            <label>Found Location:</label>
            <input type="text" id="location" required>

            <label>Upload Image:</label>
            <input type="file" id="image" accept="image/*">

            <img id="preview">

            <button type="submit">Submit Report</button>

        </form>

        <p id="msg"></p>

    </div>
</div>

<!-- Footer -->
<footer>
    <p>&copy; 2026 FindIt | Developed by Aditya Sahani</p>
</footer>

<!-- JS -->
<script src="{{ url_for('static', filename='js/upload.js') }}"></script>

</body>
</html>
