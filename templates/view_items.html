<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Items | FindIt</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <style>
        .items-container-wrapper {
            width: min(1100px, 92%);
            margin: 30px auto;
        }

        .items-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .items-card h2 {
            text-align: center;
            color: #4f46e5;
            margin-bottom: 15px;
        }

        #items-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        #msg {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <h1>FindIt</h1>
    <p>Browse all reported items</p>
</header>

<!-- ===== NAVBAR ===== -->
<nav>
    <div class="nav-container">

        <ul class="nav-links" id="navLinks">
            <li><a href="/">Home</a></li>
            <li><a href="/search">Search</a></li>
        </ul>

        <div class="nav-user" id="navUser" style="display:none;" onclick="toggleMenu()">
            👤 <span id="navUsername">User</span>

            <div id="dropdown" class="dropdown">
                <a href="/profile">Profile</a>
                <a href="/dashboard">My Reports</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>

    </div>
</nav>

<!-- ===== ITEMS ===== -->
<div class="items-container-wrapper">
    <div class="items-card">

        <h2>All Items</h2>

        <p id="msg"></p>
        <div id="items-container"></div>

    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
    <p>&copy; 2026 FindIt | Developed by Aditya Sahani</p>
</footer>

<!-- ===== SCRIPT ===== -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<script>
/* ===== NAVBAR LOGIC ===== */
fetch("/auth/check-session")
.then(res => res.json())
.then(data => {

    const navLinks = document.getElementById("navLinks");
    const navUser = document.getElementById("navUser");

    if (data.logged_in) {

        navLinks.innerHTML += `
            <li><a href="/report-lost">Report Lost</a></li>
            <li><a href="/report-found">Report Found</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
        `;

        navUser.style.display = "block";

        fetch("/user/me", { credentials: "include" })
        .then(res => res.json())
        .then(d => {
            if (d.success) {
                document.getElementById("navUsername").innerText =
                    d.user.name || "User";
            }
        });

    } else {
        navLinks.innerHTML += `
            <li><a href="/login">Login</a></li>
            <li><a href="/register">Register</a></li>
        `;
    }
});


/* ===== DROPDOWN ===== */
function toggleMenu() {
    const menu = document.getElementById("dropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}


/* ===== LOGOUT ===== */
function logout() {
    fetch("/auth/logout")
    .then(() => {
        window.location.href = "/";
    });
}
</script>

</body>
</html>
