<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item | FindIt</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <style>
        .form-container {
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <h1>FindIt</h1>
    <p>Update your item details</p>
</header>

<!-- Navigation -->
<nav>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/search">Search</a></li>
    </ul>
</nav>

<!-- Edit Form -->
<section class="form-container">
    <h2>Edit Item</h2>

    <form id="editForm">

        <label>Item Name:</label>
        <input type="text" id="title" required>

        <label>Category:</label>
        <input type="text" id="category">

        <label>Description:</label>
        <textarea id="description"></textarea>

        <label>Date:</label>
        <input type="date" id="date">

        <label>Location:</label>
        <input type="text" id="location">

        <button type="submit">Update Item</button>

    </form>
</section>

<!-- Footer -->
<footer>
    <p>&copy; 2026 FindIt | Developed by Aditya Sahani</p>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const itemId = params.get("id"); // ✅ use ID not index

// ===== LOAD ITEM =====
async function loadItem() {
    try {
        const res = await fetch("/items/my-items", {
            credentials: "include"
        });

        const data = await res.json();
        const items = data.items || [];

        const item = items.find(i => i.id === itemId);

        if (!item) {
            alert("Item not found");
            window.location.href = "/dashboard";
            return;
        }

        document.getElementById("title").value = item.title || "";
        document.getElementById("category").value = item.category || "";
        document.getElementById("description").value = item.description || "";
        document.getElementById("date").value = item.date || "";
        document.getElementById("location").value = item.location || "";

    } catch (error) {
        console.error(error);
        alert("Error loading item");
    }
}


// ===== UPDATE ITEM =====
document.getElementById("editForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const updatedData = {
        title: document.getElementById("title").value.trim(),
        category: document.getElementById("category").value.trim(),
        description: document.getElementById("description").value.trim(),
        date: document.getElementById("date").value,
        location: document.getElementById("location").value.trim()
    };

    try {
        const res = await fetch(`/items/update/${itemId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include"
        });

        const data = await res.json();

        if (res.ok) {
            alert(data.message || "Item updated successfully");
            window.location.href = "/dashboard";
        } else {
            alert(data.message || "Update failed");
        }

    } catch (error) {
        console.error(error);
        alert("Error updating item");
    }
});


// RUN
loadItem();
</script>

</body>
</html>
