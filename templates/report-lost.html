<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Lost Item | FindIt</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <style>
        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .form-card {
            background: white;
            padding: 28px;
            border-radius: 16px;
            width: min(520px, 95%);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        .form-card h2 {
            text-align: center;
            color: #4f46e5;
            margin-bottom: 18px;
        }

        .form-card input,
        .form-card select,
        .form-card textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        #preview {
            display: none;
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
        }

        #msg {
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <h1>FindIt</h1>
    <p>Lost something? Let’s help you find it again.</p>
</header>

<!-- ===== NAVBAR ===== -->
<nav>
    <div class="nav-container">

        <ul class="nav-links" id="navLinks">
            <li><a href="/">Home</a></li>
            <li><a href="/search">Search</a></li>
        </ul>

        <div class="nav-user" id="navUser" style="display:none;" onclick="toggleMenu()">
            👤 <span id="navUsername">User</span>

            <div id="dropdown" class="dropdown">
                <a href="/profile">Profile</a>
                <a href="/dashboard">My Reports</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>

    </div>
</nav>

<!-- ===== FORM ===== -->
<div class="form-container">
    <div class="form-card">

        <h2>Report Lost Item</h2>

        <form id="lostForm" enctype="multipart/form-data">

            <label>Item Name:</label>
            <input type="text" id="itemname" required>

            <label>Category:</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Mobile">Mobile</option>
                <option value="Wallet">Wallet</option>
                <option value="Documents">Documents</option>
                <option value="Vehicle">Vehicle</option>
                <option value="Others">Others</option>
            </select>

            <label>Description:</label>
            <textarea id="description" rows="4"></textarea>

            <label>Date of Loss:</label>
            <input type="date" id="date" required>

            <label>Location:</label>
            <input type="text" id="location" required>

            <label>Upload Image:</label>
            <input type="file" id="image" accept="image/*">

            <img id="preview">

            <button type="submit">Submit Report</button>

        </form>

        <p id="msg"></p>

    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
    <p>&copy; 2026 FindIt | Developed by Aditya Sahani</p>
</footer>

<!-- ===== SCRIPT ===== -->
<script src="{{ url_for('static', filename='js/upload.js') }}"></script>

<script>
/* ===== AUTH CHECK ===== */
fetch("/auth/check-session")
.then(res => res.json())
.then(data => {

    const navLinks = document.getElementById("navLinks");
    const navUser = document.getElementById("navUser");

    if (data.logged_in) {

        navLinks.innerHTML += `
            <li><a href="/report-lost">Report Lost</a></li>
            <li><a href="/report-found">Report Found</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
        `;

        navUser.style.display = "block";

        fetch("/user/me", { credentials: "include" })
        .then(res => res.json())
        .then(d => {
            if (d.success) {
                document.getElementById("navUsername").innerText =
                    d.user.name || "User";
            }
        });

    } else {
        window.location.href = "/login";
    }
});


/* ===== DROPDOWN ===== */
function toggleMenu() {
    const menu = document.getElementById("dropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}


/* ===== LOGOUT ===== */
function logout() {
    fetch("/auth/logout")
    .then(() => {
        window.location.href = "/";
    });
}
</script>

</body>
</html>
