<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | FindIt</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <style>
        .profile-container {
            width: min(1000px, 92%);
            margin: 30px auto;
        }

        .profile-card {
            background: white;
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-header h2 {
            color: #4f46e5;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            transition: 0.3s;
            border: 1px solid #e2e8f0;
        }

        .item-card:hover {
            transform: translateY(-5px);
        }

        .item-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
        }

        .lost {
            background: #fee2e2;
            color: #dc2626;
        }

        .found {
            background: #dcfce7;
            color: #16a34a;
        }

        .actions {
            margin-top: 10px;
        }

        .actions span {
            cursor: pointer;
            color: #4f46e5;
            font-weight: 600;
            margin-right: 10px;
        }

        .actions span:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <h1>FindIt</h1>
    <p>Your Profile</p>
</header>

<!-- ===== NAVBAR ===== -->
<nav>
    <div class="nav-container">

        <ul class="nav-links" id="navLinks">
            <li><a href="/">Home</a></li>
            <li><a href="/search">Search</a></li>
        </ul>

        <div class="nav-user" id="navUser" style="display:none;" onclick="toggleMenu()">
            😎 <span id="navUsername">User</span>

            <div id="dropdown" class="dropdown">
                <a href="/profile">Profile</a>
                <a href="/dashboard">My Reports</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>

    </div>
</nav>

<!-- ===== PROFILE ===== -->
<div class="profile-container">

    <!-- USER INFO -->
    <div class="profile-card" id="userInfo">
        Loading user...
    </div>

    <!-- ITEMS -->
    <div class="profile-card">
        <h3 style="text-align:center;">My Items</h3>
        <div id="myItems" class="item-grid">Loading...</div>
    </div>

</div>

<!-- ===== FOOTER ===== -->
<footer>
    <p>&copy; 2026 FindIt | Developed by Aditya Sahani</p>
</footer>

<!-- ===== SCRIPT ===== -->
<script>
/* ===== NAVBAR ===== */
fetch("/auth/check-session")
.then(res => res.json())
.then(data => {

    const navLinks = document.getElementById("navLinks");
    const navUser = document.getElementById("navUser");

    if (data.logged_in) {

        navLinks.innerHTML += `
            <li><a href="/dashboard">Dashboard</a></li>
        `;

        navUser.style.display = "block";

        fetch("/user/me", { credentials: "include" })
        .then(res => res.json())
        .then(d => {
            if (d.success) {
                document.getElementById("navUsername").innerText =
                    d.user.name || "User";

                document.getElementById("userInfo").innerHTML = `
                    <div class="profile-header">
                        <div>
                            <h2>${d.user.name || d.user.fullname || "User"}</h2>
                            <p>${d.user.email}</p>
                        </div>
                    </div>
                `;
            }
        });

    } else {
        window.location.href = "/login";
    }
});


/* ===== LOAD ITEMS ===== */
async function loadItems() {
    try {
        const res = await fetch("/items/my-items", {
            credentials: "include"
        });

        const data = await res.json();
        const items = data.items || [];

        const container = document.getElementById("myItems");
        container.innerHTML = "";

        if (items.length === 0) {
            container.innerHTML = "<p>No items posted yet.</p>";
            return;
        }

        items.reverse().forEach(item => {

            const div = document.createElement("div");
            div.className = "item-card";

            div.innerHTML = `
                <h4>${item.title}</h4>
                <p>${item.description || ""}</p>

                <p><strong>Category:</strong> ${item.category}</p>
                <p><strong>Location:</strong> ${item.location}</p>
                <p><strong>Date:</strong> ${item.date}</p>

                <span class="badge ${item.type}">
                    ${item.type.toUpperCase()}
                </span>

                ${
                    item.image_url
                    ? `<img src="${item.image_url}">`
                    : ""
                }

                <div class="actions">
                    <span onclick="editItem('${item.id}')">Edit</span>
                    <span onclick="deleteItem('${item.id}')">Delete</span>
                </div>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        document.getElementById("myItems").innerHTML =
            "<p>Error loading items.</p>";
    }
}


/* ===== ACTIONS ===== */
function editItem(id) {
    window.location.href = `/edit-item?id=${id}`;
}

async function deleteItem(id) {
    if (!confirm("Delete this item?")) return;

    try {
        const res = await fetch(`/items/delete/${id}`, {
            method: "DELETE",
            credentials: "include"
        });

        const data = await res.json();
        alert(data.message || "Deleted");

        loadItems();
    } catch (err) {
        alert("Error deleting item");
    }
}


/* ===== DROPDOWN ===== */
function toggleMenu() {
    const menu = document.getElementById("dropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}


/* ===== LOGOUT ===== */
function logout() {
    fetch("/auth/logout")
    .then(() => {
        window.location.href = "/";
    });
}


/* INIT */
loadItems();
</script>

</body>
</html>
