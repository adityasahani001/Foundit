<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Items | FindIt</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>FindIt</h1>
        <p>Search and reconnect with lost items</p>
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/report-lost">Report Lost</a></li>
            <li><a href="/report-found">Report Found</a></li>
            <li><a href="/search">Search</a></li>
        </ul>
    </nav>

    <!-- Search -->
    <section>
        <h2>Search Lost & Found Items</h2>

        <form id="searchForm">

            <label>Item Name:</label>
            <input type="text" id="keyword" placeholder="e.g. wallet, phone">

            <label>Category:</label>
            <select id="category">
                <option value="">All Categories</option>
                <option value="Mobile">Mobile</option>
                <option value="Jewellery">Jewellery</option>
                <option value="Cloths">Cloths</option>
                <option value="Accessories">Accessories</option>
                <option value="Wallet">Wallet</option>
                <option value="Documents">Documents</option>
                <option value="Vehicle">Vehicle</option>
                <option value="Others">Others</option>
            </select>

            <label>Location:</label>
            <input type="text" id="location" placeholder="e.g. Delhi">

            <label>Status:</label>
            <select id="type">
                <option value="">All</option>
                <option value="lost">Lost</option>
                <option value="found">Found</option>
            </select>

            <button type="submit">Search</button>

        </form>
    </section>

    <!-- Results -->
    <section>
        <h2>Search Results</h2>

        <p id="msg"></p>
        <div id="results"></div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 FindIt | Developed by Aditya Sahani</p>
    </footer>

    <!-- 🔥 External JS -->
    <script src="{{ url_for('static', filename='js/search.js') }}"></script>

</body>
</html>
