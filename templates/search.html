<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Items | FindIt</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <style>
        .search-container {
            width: min(1100px, 92%);
            margin: 30px auto;
        }

        .search-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .search-card h2 {
            color: #4f46e5;
            margin-bottom: 15px;
            text-align: center;
        }

        .search-form input,
        .search-form select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        #msg {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <h1>FindIt</h1>
    <p>Search and reconnect with lost items</p>
</header>

<!-- ===== NAVBAR ===== -->
<nav>
    <div class="nav-container">

        <ul class="nav-links" id="navLinks">
            <li><a href="/">Home</a></li>
        </ul>

        <div class="nav-user" id="navUser" style="display:none;" onclick="toggleMenu()">
            👤 <span id="navUsername">User</span>

            <div id="dropdown" class="dropdown">
                <a href="/profile">Profile</a>
                <a href="/dashboard">My Reports</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>

    </div>
</nav>

<!-- ===== MAIN ===== -->
<div class="search-container">

    <!-- SEARCH FORM -->
    <div class="search-card">
        <h2>Search Lost & Found Items</h2>

        <form id="searchForm" class="search-form">

            <label>Item Name:</label>
            <input type="text" id="keyword" placeholder="e.g. wallet, phone">

            <label>Category:</label>
            <select id="category">
                <option value="">All Categories</option>
                <option value="Mobile">Mobile</option>
                <option value="Jewellery">Jewellery</option>
                <option value="Clothes">Clothes</option>
                <option value="Accessories">Accessories</option>
                <option value="Wallet">Wallet</option>
                <option value="Documents">Documents</option>
                <option value="Vehicle">Vehicle</option>
                <option value="Others">Others</option>
            </select>

            <label>Location:</label>
            <input type="text" id="location" placeholder="e.g. Delhi">

            <label>Status:</label>
            <select id="type">
                <option value="">All</option>
                <option value="lost">Lost</option>
                <option value="found">Found</option>
            </select>

            <button type="submit">Search</button>

        </form>
    </div>

    <!-- RESULTS -->
    <div class="search-card">
        <h2>Search Results</h2>

        <p id="msg"></p>
        <div id="results"></div>
    </div>

</div>

<!-- ===== FOOTER ===== -->
<footer>
    <p>&copy; 2026 FindIt | Developed by Aditya Sahani</p>
</footer>

<!-- ===== SCRIPT ===== -->
<script src="{{ url_for('static', filename='js/search.js') }}"></script>

<script>
/* ===== NAVBAR LOGIC ===== */
fetch("/auth/check-session")
.then(res => res.json())
.then(data => {

    const navLinks = document.getElementById("navLinks");
    const navUser = document.getElementById("navUser");

    if (data.logged_in) {

        navLinks.innerHTML += `
            <li><a href="/report-lost">Report Lost</a></li>
            <li><a href="/report-found">Report Found</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
        `;

        navUser.style.display = "block";

        fetch("/user/me", { credentials: "include" })
        .then(res => res.json())
        .then(d => {
            if (d.success) {
                document.getElementById("navUsername").innerText =
                    d.user.name || "User";
            }
        });

    } else {
        navLinks.innerHTML += `
            <li><a href="/login">Login</a></li>
            <li><a href="/register">Register</a></li>
        `;
    }
});


/* ===== DROPDOWN ===== */
function toggleMenu() {
    const menu = document.getElementById("dropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}


/* ===== LOGOUT ===== */
function logout() {
    fetch("/auth/logout")
    .then(() => {
        window.location.href = "/";
    });
}
</script>

</body>
</html>
